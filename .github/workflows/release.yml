name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Skip version-only commits
        id: skip
        run: |
          MSG=$(git log -1 --format=%s)
          if [[ "$MSG" =~ ^chore\(release\): ]]; then
            echo "Version bump commit detected, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.skip.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute next version
        if: steps.skip.outputs.skip == 'false'
        id: version
        run: |
          git fetch --tags --force
          LAST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            BASE_VERSION=$(node -p "require('./app.json').expo.version")
          else
            BASE_VERSION=${LAST_TAG#v}
          fi

          # Install conventional-recommended-bump
          npm install -g conventional-recommended-bump conventional-changelog-angular

          BUMP_TYPE=$(conventional-recommended-bump -p angular 2>/dev/null || echo "patch")

          NEXT_VERSION=$(node -e "
            const [major, minor, patch] = '${BASE_VERSION}'.split('.').map(Number);
            const bump = '${BUMP_TYPE}';
            if (bump === 'major') console.log([major+1, 0, 0].join('.'));
            else if (bump === 'minor') console.log([major, minor+1, 0].join('.'));
            else console.log([major, minor, patch+1].join('.'));
          ")

          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION (bump: $BUMP_TYPE)"

      - name: Check if tag exists
        if: steps.skip.outputs.skip == 'false'
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.skip.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Update package versions
        if: steps.skip.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${VERSION}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - name: Commit and push version bump
        if: steps.skip.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add package.json app.json
          git commit -m "chore(release): bump version to ${VERSION}"
          git push origin HEAD:refs/heads/main

      - name: Trigger APK build
        if: steps.skip.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "apk-build.yml",
              ref: "${{ steps.version.outputs.tag }}",
            });
            console.log("Triggered APK build for ${{ steps.version.outputs.tag }}");
